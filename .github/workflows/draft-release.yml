name: Staging Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  tests:
    name: Tests (matrix)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m pip install .[test] build

      - name: Run unit tests
        run: |
          pytest tests/test_smsru.py

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout the tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Python (build)
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine setuptools_scm

      - name: Build distributions
        run: |
          python -m build

      - name: Validate distributions
        run: |
          python -m twine check dist/*

      - name: Verify tag matches built version
        run: |
          python - <<'PY'
          import glob
          import pathlib
          import sys

          tag = "${{ github.ref_name }}"
          expected = tag[1:] if tag.startswith("v") else tag
          wheel = pathlib.Path(glob.glob("dist/*.whl")[0]).name
          parts = wheel[:-4].split("-")
          if len(parts) < 2:
              raise SystemExit(f"Unexpected wheel filename: {wheel}")
          actual = parts[1]
          if actual != expected:
              raise SystemExit(f"Tag version {expected!r} does not match wheel version {actual!r}")
          print(f"Verified version {actual} from {wheel}")
          PY

      - name: Smoke test wheel install in clean environment
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          import smsru_api
          from smsru_api import AsyncClient, Client

          assert smsru_api is not None
          assert Client is not None
          assert AsyncClient is not None
          print("Smoke import passed")
          PY

      - name: Upload artifact (dist) for inspection
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/*
  
  publish-test-pypi:
    name: Publish to Test PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: testpypi
    outputs:
      testpypi-version: ${{ steps.testpypi-version.outputs.version }}
    
    steps:
      - name: Checkout the tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
      
      - name: Set up Python (publish)
        uses: actions/setup-python@v5
      
      - name: Install publish tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install "packaging>=24.2" build twine setuptools_scm

      - name: Compute TestPyPI version
        id: testpypi-version
        run: |
          echo "version=${GITHUB_REF_NAME#v}.dev${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Build TestPyPI distributions
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ steps.testpypi-version.outputs.version }}
        run: |
          python -m build --outdir dist-testpypi

      - name: Validate TestPyPI distributions
        run: |
          python -m twine check dist-testpypi/*

      - name: Publish to Test PyPI
        run: |
          python -m twine upload --verbose --non-interactive --skip-existing --repository-url https://test.pypi.org/legacy/ dist-testpypi/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  draft-release:
    name: Create draft release with assets
    runs-on: ubuntu-latest
    needs: publish-test-pypi

    steps:
      - name: Download artifact (dist) for inspection
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist

      - name: Set release metadata
        id: release-meta
        run: |
          if [[ "${{ github.ref_name }}" =~ (alpha|beta|rc) ]]; then
            echo "release_state=pre" >> "$GITHUB_OUTPUT"
          else
            echo "release_state=stable" >> "$GITHUB_OUTPUT"
          fi
          echo "release_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      
      - name: Create (or update) draft release for this tag
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: ${{ steps.release-meta.outputs.release_state == 'pre' }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          body: |
            # Установка

            ```
            pip install smsru-api==${{ steps.release-meta.outputs.release_version }}
            ```

            ## Изменения

            - 

            ## Проверка перед публикацией

            - [ ] Проверен пакет в TestPyPI: https://test.pypi.org/project/smsru-api/${{ needs.publish-test-pypi.outputs.testpypi-version }}/
            - [ ] Проверена установка и импорт
            - [ ] Проверена версия `${{ steps.release-meta.outputs.release_version }}`
